app = "football-predictor"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  DB_PATH = "/data/football.db"
  SCHEMA_PATH = "internal/repository/schema.sql"
  STATIC_DIR = "static"
  ENABLE_WORKER = "true"
  FOOTBALL_DATA_COMPETITIONS = "CL,WC"
  FOOTBALL_DATA_DAYS_AHEAD = "7"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[mounts]]
  source = "football_data"
  destination = "/data"
